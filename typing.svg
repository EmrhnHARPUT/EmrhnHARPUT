<svg width="600" height="80" viewBox="0 0 600 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes typing1 {
        0%   { width: 0px }
        25%  { width: 280px }
        45%  { width: 280px }
        55%  { width: 0px }
        100% { width: 0px }
      }
      @keyframes typing2 {
        0%   { width: 0px }
        50%  { width: 0px }
        55%  { width: 0px }
        75%  { width: 340px }
        90%  { width: 340px }
        100% { width: 0px }
      }
      @keyframes show2 {
        0%   { opacity: 0 }
        49%  { opacity: 0 }
        50%  { opacity: 1 }
        95%  { opacity: 1 }
        100% { opacity: 0 }
      }
      @keyframes blink {
        0%, 100% { opacity: 1 }
        50%       { opacity: 0 }
      }
      .cur { animation: blink 0.75s step-end infinite; }
    </style>
    <clipPath id="c1">
      <rect x="160" y="0" height="80" width="0">
        <animate attributeName="width" values="0;280;280;0;0" keyTimes="0;0.25;0.45;0.55;1" dur="7s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </clipPath>
    <clipPath id="c2">
      <rect x="130" y="0" height="80" width="0">
        <animate attributeName="width" values="0;0;340;340;0" keyTimes="0;0.5;0.75;0.9;1" dur="7s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </clipPath>
  </defs>

  <text x="160" y="52" font-family="'Courier New',monospace" font-size="30" font-weight="bold" fill="#6366f1" clip-path="url(#c1)">Emirhan HARPUT</text>

  <text x="130" y="52" font-family="'Courier New',monospace" font-size="30" font-weight="bold" fill="#6366f1" clip-path="url(#c2)">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.5;0.95;1" dur="7s" repeatCount="indefinite"/>
    AI Engineering Student
  </text>

  <rect class="cur" y="22" width="3" height="34" fill="#6366f1">
    <animate attributeName="x" values="160;440;440;160;160;130;470;470;130;130" keyTimes="0;0.25;0.45;0.55;0.5;0.5;0.75;0.9;1;1" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
