name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23f97316&color_dots=%231e1b4b,%234c1d95,%23c2410c,%23ea580c,%23fb923c&color_dots_border=%2300000000
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23f97316&color_dots=%231e1b4b,%234c1d95,%23c2410c,%23ea580c,%23fb923c&color_dots_border=%2300000000

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
